name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r windows/requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        run: |
          pyinstaller windows/main.spec --clean --noconfirm

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-keyboard-windows
          path: dist/WhisperKeyboard/
          retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -fsSL -o sdk-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q sdk-tools.zip
          mv cmdline-tools latest
          rm sdk-tools.zip
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null 2>&1
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;28.2.13676358" "cmake;3.22.1"

      - name: Generate debug keystore for release
        run: |
          keytool -genkey -v -keystore android/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          export RELEASE_KEYSTORE_PATH=debug.keystore
          export RELEASE_KEYSTORE_PASSWORD=android
          export RELEASE_KEY_ALIAS=androiddebugkey
          export RELEASE_KEY_PASSWORD=android
          ./gradlew assembleRelease --no-daemon

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-keyboard-android
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  create-release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: whisper-keyboard-windows
          path: artifacts/windows

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: whisper-keyboard-android
          path: artifacts/android

      - name: Get short commit hash
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.vars.outputs.sha_short }}
          name: Build ${{ steps.vars.outputs.sha_short }}
          body: |
            Auto-built from master branch commit ${{ github.sha }}

            **Windows:** Extract and run `WhisperKeyboard.exe`
            **Android:** Install `app-release.apk` on your device
          files: |
            artifacts/windows/WhisperKeyboard.exe
            artifacts/android/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
